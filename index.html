<!DOCTYPE html lang="pt-BR">
<html>
<head>
    <meta charset="UTF-8">
    <title>Gravação + Playback</title>
    <style>
        * {
            user-select: none;
        }

        html, body {
            margin: 0;
            padding: 0;
            
            font-family: sans-serif;
        }

        #recorder {
            position: relative;
            background: #E1E1E1;
            width: 870px;
            height: 460px;
        }

        #record-btn {
            appearance: none;
            border: none;
            padding: 0px;
            margin: 0px;
            display: block;
            position: absolute;
            left: 50%;
            bottom: 0px;
            transform: translateX(-50%);
            width: 97px;
            height: 113px;
            background: none;
            background-image: url("/assets/images/gravar.png");
        }

        #record-btn.playback {
            touch-action: none;
            pointer-events: none;
        }

        #record-btn::before {
            content: "";
            display: block;
            position: absolute;
            left: 50%;
            top: 57%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background-color: red;
            width: 36px;
            height: 36px;
            outline: 4px solid;
            outline-color: red;
            outline-offset: 2px;
        }

        #record-btn.waiting::before {
            background-color: black;
            outline-color: black;
        }

        #record-btn.recording::before {
            background-color: red;
            outline-color: red;
        }
        
        #record-btn.playback::before {
            background-color: green;
            outline-color: green;
        }

        #vu {
            width: 237px;
            height: 112px;
            position: absolute;
            right: 0px;
            bottom: 0px;
            background-image: url("/assets/images/input.png");
            overflow: hidden;
        }

        #needle {
            width: 3px;
            height: 100px;
            background: white;
            position: absolute;
            left: 50%;
            bottom: -10px;
            transform-origin: bottom center;
            transform: rotate(-25deg);
        }

        #info-box {
            display: block;
            position: absolute;
            top: 0px;
            left: 0px;
            width: 870px;
            height: 315px;
            background-color: black;
        }

        #grelha {
            display: block;
            position: absolute;
            width: 236px;
            height: 112px;
            left: 0px;
            bottom: 0px;
            background-image: url("/assets/images/grelha.png");
        }

        #credito {
            display: block;
            position: absolute;
            left: 13px;
            bottom: 13px;
            color: white;
            font-size: 10px;
        }

        #timer {
            display: flex;
            position: absolute;
            height: 30px;
            width: 70px;
            left: 825px;
            top: 280px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            align-items: center;
            font-size: 10px;
        }

        #timer::before {
            content: "";
            display: inline-block;
            position: absolute;
            top: 50%;
            left: -15px;
            transform: translateY(-50%);
            margin-right: 10px;
            background-color: green;
            border-radius: 50%;
            width: 9px;
            height: 9px;
        }
    </style>
</head>
<body>

<div id="recorder">
    <div id="info-box">
        <div id="credito">CARINHOSO</div>
        <div id="timer"></div>
    </div>

    <div id="grelha"></div>

    <button id="record-btn" class="waiting"></button>

    <div id="vu">
        <div id="needle"></div>
    </div>
</div>

<script>
{
    const recBtn = document.getElementById("record-btn");
    const needle = document.getElementById("needle");
    const timerEl = document.getElementById("timer");

    let audioCtx, analyserNode, dataArray;
    let recording = false;
    let isUpdating = false;

    let mediaRecorder;
    let recordedChunks = [];
    let micStream;

    let smoothVolume = 0;

    let timerStart = 0;
    let timerMode = null;

    let recordingStartMs = 0;
    let recordingDurationMs = 0;

    const CONFIG = {
        BASE_VOLUME: 0.3,
        PLAYBACK_BASE_VOLUME: 0.25,
        NOISE_VOLUME: 0.8,
        LATENCY_COMPENSATION_MS: 200,
        START_DELAY_MS: 0
    };

    const baseAudio = new Audio();
    const noiseAudio = new Audio("assets/audio/electrical-noise.wav");
    noiseAudio.loop = true;

    let playbackVoice = null;
    let playbackBase = null;

    const formatTime = (ms) => {
        const totalSec = Math.floor(ms / 1000);
        const min = String(Math.floor(totalSec / 60)).padStart(2, '0');
        const sec = String(totalSec % 60).padStart(2, '0');
        return `${min}:${sec}`;
    };

    const stopAllPlayback = () => {
        if (playbackVoice) {
            playbackVoice.pause();
            playbackVoice.currentTime = 0;
            playbackVoice = null;
        }

        if (playbackBase) {
            playbackBase.pause();
            playbackBase.currentTime = 0;
            playbackBase = null;
        }

        noiseAudio.pause();
        noiseAudio.currentTime = 0;

        timerMode = null;
        timerEl.textContent = "";
    };

    const initAudio = async () => {
        if (audioCtx) return;

        audioCtx = new AudioContext();

        analyserNode = audioCtx.createAnalyser();
        analyserNode.fftSize = 2048;

        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const source = audioCtx.createMediaStreamSource(micStream);
        source.connect(analyserNode);

        dataArray = new Uint8Array(analyserNode.frequencyBinCount);
    };

    document.body.addEventListener("click", initAudio, { once: true });

    const update = () => {
        if (!analyserNode || !dataArray) return;

        if (recording) {
            analyserNode.getByteTimeDomainData(dataArray);

            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                const v = (dataArray[i] - 128) / 128;
                sum += v * v;
            }

            const rms = Math.sqrt(sum / dataArray.length);
            smoothVolume = smoothVolume * 0.9 + rms * 0.1;
        } else {
            smoothVolume *= 0.9;
        }

        const vu = Math.log10(1 + smoothVolume * 9);
        const angle = vu * 90 - 25;

        needle.style.transform = `rotate(${angle}deg)`;

        if (timerMode) {
            const elapsed = Date.now() - timerStart;
            timerEl.textContent = formatTime(elapsed);
        }

        requestAnimationFrame(update);
    };

    const startRecording = async () => {
        stopAllPlayback();

        await initAudio();

        if (audioCtx.state === "suspended") {
            await audioCtx.resume();
        }

        recordedChunks = [];

        mediaRecorder = new MediaRecorder(micStream);

        mediaRecorder.ondataavailable = e => {
            if (e.data.size > 0) recordedChunks.push(e.data);
        };

        mediaRecorder.onstop = playback;

        mediaRecorder.start();

        recordingStartMs = Date.now();
        timerStart = Date.now();
        timerMode = "record";

        setTimeout(() => {
            baseAudio.src = "assets/audio/00_voz_como_gravacao_digital.wav";
            baseAudio.volume = CONFIG.BASE_VOLUME;
            baseAudio.currentTime = 0;

            baseAudio.play().catch(() => {});
            baseAudio.onended = stopRecording;
        }, CONFIG.START_DELAY_MS);

        recording = true;
        recBtn.classList.remove("waiting");
        recBtn.classList.add("recording");

        console.log("change rec btn class", recBtn.classList)

        if (!isUpdating) {
            isUpdating = true;
            update();
        }
    };

    const stopRecording = () => {
        if (!recording) return;

        recording = false;

        baseAudio.pause();
        baseAudio.currentTime = 0;

        recordingDurationMs = Date.now() - recordingStartMs;

        mediaRecorder.stop();
    };

    const playback = () => {
        const blob = new Blob(recordedChunks, { type: "audio/webm" });
        const voiceURL = URL.createObjectURL(blob);

        playbackVoice = new Audio(voiceURL);
        playbackBase = new Audio("assets/audio/00_voz_como_gravacao_digital.wav");

        playbackVoice.volume = 1.0;
        playbackBase.volume = CONFIG.PLAYBACK_BASE_VOLUME;
        noiseAudio.volume = CONFIG.NOISE_VOLUME;

        playbackVoice.currentTime = 0;
        playbackBase.currentTime = 0;
        noiseAudio.currentTime = 0;

        playbackBase.play().catch(() => {});
        noiseAudio.play().catch(() => {});

        playbackVoice.onloadedmetadata = () => {
            const realDurationMs = playbackVoice.duration * 1000;

            let offsetMs = recordingDurationMs - realDurationMs;
            offsetMs -= CONFIG.LATENCY_COMPENSATION_MS;
            offsetMs = Math.max(0, offsetMs);

            const offsetSec = offsetMs / 1000;
            
            playbackBase.play().catch(() => {});
            noiseAudio.play().catch(() => {});
            
            recBtn.classList.remove("recording");
            recBtn.classList.add("playback");
            
            playbackVoice.play().then(() => {
                
                playbackVoice.currentTime = offsetSec;
                
                setTimeout(() => {
                    playbackVoice.currentTime = offsetSec;
                }, 50);
            }).catch(() => {});

            timerStart = Date.now();
            timerMode = "playback";
        };

        playbackVoice.onended = () => {
            stopAllPlayback();
            
        recBtn.classList.remove("playback");
        recBtn.classList.add("waiting");
        };
    };

    const toggleRecording = () => {
        if (!recording) {
            startRecording();
        } else {
            stopRecording();
        }
    };

    recBtn.addEventListener("click", toggleRecording);
}
</script>

</body>
</html>
